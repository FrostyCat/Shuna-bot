<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Shuna Dashboard{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:       #f472b6;
      --pink-dark:  #db2777;
      --pink-dim:   rgba(244,114,182,0.12);
      --pink-border:rgba(244,114,182,0.18);
      --bg:         #0d0910;
      --bg2:        #150c18;
      --bg3:        #1e1220;
      --bg4:        #261629;
      --surface:    #1e1220;
      --surface2:   #261629;
      --border:     rgba(244,114,182,0.13);
      --text:       #f0e6f0;
      --muted:      #b07aaa;
      --muted2:     #7a5278;
      --discord:    #5865f2;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "Noto Sans", Arial, sans-serif;
      font-size: 15px;
    }

    a { color: inherit; text-decoration: none; }

    /* ── Subtle sakura background ── */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 15% 0%,   rgba(45,10,46,0.55) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 85% 100%, rgba(61,10,24,0.45) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Navbar ── */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 200;
      background: rgba(13,9,16,0.82);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 18px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.3px;
    }

    .navbar-brand .brand-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--pink);
      box-shadow: 0 0 8px var(--pink);
      animation: dot-pulse 2.5s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes dot-pulse {
      0%, 100% { box-shadow: 0 0 5px var(--pink); }
      50%       { box-shadow: 0 0 14px var(--pink), 0 0 24px var(--pink-dark); }
    }

    .navbar-user {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: var(--muted);
    }

    .navbar-user img {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 2px solid var(--pink-border);
    }

    .navbar-user a {
      color: var(--muted);
      font-size: 13px;
      padding: 5px 12px;
      border-radius: 6px;
      background: var(--pink-dim);
      border: 1px solid var(--pink-border);
      transition: background 0.15s, color 0.15s;
    }
    .navbar-user a:hover {
      background: rgba(244,114,182,0.2);
      color: var(--pink);
    }

    /* ── Main layout ── */
    .container {
      position: relative;
      z-index: 1;
      max-width: 980px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    /* ── Typography ── */
    h1 {
      font-size: 26px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 8px;
      letter-spacing: -0.3px;
    }

    h2 {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 16px;
    }

    p { color: var(--muted); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 18px;
      border-radius: 7px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: filter 0.15s, transform 0.1s;
      white-space: nowrap;
      font-family: inherit;
    }
    .btn:hover { filter: brightness(1.12); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .btn-primary {
      background: linear-gradient(135deg, var(--pink-dark), var(--pink));
      color: #fff;
      box-shadow: 0 2px 12px rgba(244,114,182,0.25);
    }

    .btn-secondary {
      background: var(--pink-dim);
      color: var(--pink);
      border: 1px solid var(--pink-border);
    }

    .btn-danger {
      background: rgba(225,29,72,0.15);
      color: #f87171;
      border: 1px solid rgba(225,29,72,0.25);
    }
    .btn-danger:hover { background: rgba(225,29,72,0.28); }

    .btn-sm { padding: 6px 13px; font-size: 13px; }

    /* ── Sakura petal decoration (subtle, static) ── */
    .petal-accent {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      font-size: 18px;
      opacity: 0.07;
      user-select: none;
    }
    .petal-accent.p1 { top: 12%; right: 6%;  transform: rotate(30deg);  font-size: 28px; }
    .petal-accent.p2 { top: 55%; right: 2%;  transform: rotate(-20deg); font-size: 16px; }
    .petal-accent.p3 { bottom: 20%; left: 3%; transform: rotate(55deg);  font-size: 22px; }
    .petal-accent.p4 { top: 30%; left: 1%;  transform: rotate(-40deg); font-size: 14px; }

    /* ── Form elements ── */
    input[type="text"],
    input[type="email"],
    input[type="password"],
    select,
    textarea {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 14px;
      padding: 9px 12px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input[type="text"]:focus,
    input[type="email"]:focus,
    select:focus,
    textarea:focus {
      border-color: var(--pink);
      box-shadow: 0 0 0 3px rgba(244,114,182,0.12);
    }

    /* ── Alerts ── */
    .alert { padding: 12px 16px; border-radius: 8px; font-size: 14px; margin-bottom: 20px; }
    .alert-success { background: rgba(59,165,92,0.12); color: #3ba55c; border: 1px solid rgba(59,165,92,0.3); }
    .alert-danger  { background: rgba(225,29,72,0.12);  color: #f87171; border: 1px solid rgba(225,29,72,0.25); }

    /* ── Cards / surfaces ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    /* ── Tables ── */
    .stats-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      background: var(--surface);
      border-radius: 10px;
      overflow: hidden;
    }

    .stats-table th {
      background: var(--bg3);
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      padding: 11px 16px;
      text-align: left;
      white-space: nowrap;
      border-bottom: 1px solid var(--border);
    }

    .stats-table td {
      padding: 10px 16px;
      color: var(--text);
      border-top: 1px solid var(--border);
      vertical-align: middle;
    }

    .stats-table tr:hover td { background: rgba(244,114,182,0.04); }

    /* ── Dividers ── */
    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 28px 0;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: rgba(244,114,182,0.25); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(244,114,182,0.45); }
  </style>
  {% block head %}{% endblock %}
</head>
<body>

<span class="petal-accent p1">✿</span>
<span class="petal-accent p2">✿</span>
<span class="petal-accent p3">✿</span>
<span class="petal-accent p4">✿</span>

<nav class="navbar">
  <a class="navbar-brand" href="/">
    <span class="brand-dot"></span>
    Shuna
  </a>
  {% if user %}
  <div class="navbar-user">
    {% if user.avatar %}
      <img src="https://cdn.discordapp.com/avatars/{{ user.id }}/{{ user.avatar }}.png" alt="" />
    {% endif %}
    <span>{{ user.username }}</span>
    <a href="/logout">Logout</a>
  </div>
  {% endif %}
</nav>

{% block content %}{% endblock %}

</body>
</html>
